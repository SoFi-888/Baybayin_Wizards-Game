<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baybayin Wizards</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/gamestyle.css" />
</head>
<body>

<header class="top-bar">
  <div class="top-bar__left">
    <div class="score-badge">
      <span class="score-label">TALA</span>
      <span class="score-value" id="scoreDisplay">0</span>
    </div>
    <div class="level-badge" id="levelBadge">LEVEL <span id="levelNum">1</span></div>
  </div>
  <div class="top-bar__center">
    <div class="chapter-banner"><span id="chapterTitle">Chapter 1: The Ancient Scroll</span></div>
    <div class="word-display-bar">
      <div class="word-tiles-row" id="wordTilesRow"></div>
    </div>
  </div>
  <div class="top-bar__right">
    <div class="enemy-name-badge" id="enemyName">Pebble Frog</div>
  </div>
</header>

<div style="display:none">
  <div id="playerLives"></div>
  <div id="enemyLives"></div>
</div>

<section class="battle-stage">
  <div class="stage-bg"></div>

  <!-- Hero HP bar -->
  <div class="hp-overlay hp-overlay--hero">
    <div class="hp-track"><div class="hp-fill hp-fill--hero" id="heroHpFill"></div></div>
  </div>

  <!-- Enemy HP bar -->
  <div class="hp-overlay hp-overlay--enemy">
    <div class="hp-track"><div class="hp-fill hp-fill--enemy" id="enemyHpFill"></div></div>
  </div>

  <div class="hero-side">
    <div class="character hero" id="heroChar">
      <img class="hero-img" src="/img/Tala.png" alt="Tala" />
    </div>
  </div>

  <div class="enemy-side">
    <div class="character enemy" id="enemyChar">
      <img class="enemy-img" src="/img/Pebble_frog.png" alt="Pebble Frog" />
    </div>
  </div>
</section>

<section class="game-floor">

  <!-- Left panel -->
  <div class="curtain-panel curtain-panel--left">
    <div class="curtain-top"></div>
    <div class="panel-content">
      <p class="panel-title">Items</p>
      <div class="item-slots">
        <div class="item-slot" id="item0" onclick="this.querySelector('.item-use-btn').click()">
          <img class="item-img" src="/img/health_potion.png" alt="Health Potion" />
        </div>
        <div class="item-slot" id="item1" onclick="this.querySelector('.item-use-btn').click()">
          <img class="item-img" src="/img/strength_potion.png" alt="Strength Potion" />
        </div>
        <div class="item-slot item-slot--empty" id="item2">
        </div>
      </div>
      <div class="hint-panel">
        <p class="hint-panel__label">Hint</p>
        <p class="hint-panel__roman hidden" id="hintRoman"></p>
        <p class="hint-panel__count" id="hintCount">3 hints left</p>
      </div>
    </div>
    <div class="curtain-bottom"></div>
  </div>

  <!-- Center -->
  <div class="center-panel">
    <div class="combo-display" id="comboDisplay">
      <span class="combo-text" id="comboText">x1</span>
      <span class="combo-label">COMBO</span>
    </div>
    <div class="word-prompt">
      <span class="word-prompt__label">Spell:</span>
      <span class="word-prompt__baybayin" id="promptBaybayin"></span>
      <span class="word-prompt__roman hidden" id="promptRoman"></span>
      <span class="word-prompt__meaning" id="promptMeaning"></span>
    </div>
    <div class="tile-grid" id="tileGrid"></div>
    <div class="action-row">
      <button class="action-btn action-btn--scramble" id="btnScramble">Scramble</button>
      <button class="action-btn action-btn--attack" id="btnAttack">Attack!</button>
      <button class="action-btn action-btn--hint" id="btnHint">Hint</button>
      <button class="action-btn action-btn--menu" id="btnMenu">Menu</button>
    </div>
  </div>

  <!-- Right panel -->
  <div class="curtain-panel curtain-panel--right">
    <div class="curtain-top"></div>
    <div class="panel-content">
      <p class="panel-title">Enemy</p>
      <div class="enemy-desc" id="enemyDesc">
        <p class="enemy-desc__name" id="enemyDescName">Pebble Frog</p>
        <p class="enemy-desc__lore" id="enemyDescLore">A stone-armored frog lurking in jungle paths.</p>
      </div>
      <div class="ol-divider" style="margin:4px 0"></div>
      <p class="panel-title">Word Info</p>
      <div class="word-info-box">
        <p class="wi-baybayin" id="wiBaybayin"></p>
        <p class="wi-roman"    id="wiRoman"></p>
        <p class="wi-meaning"  id="wiMeaning"></p>
        <p class="wi-points"   id="wiPoints"></p>
      </div>
      <div class="streak-box">
        <p class="streak-label">Best Streak</p>
        <p class="streak-val" id="streakVal">0</p>
      </div>
    </div>
    <div class="curtain-bottom"></div>
  </div>

</section>

<div class="feedback-layer" id="feedbackLayer"></div>

<div class="overlay hidden" id="pauseOverlay">
  <div class="overlay-box">
    <button class="ol-close" id="btnClosePause" aria-label="Close">✕</button>
    <h2 class="overlay-title">— Paused —</h2>
    <button class="ol-btn ol-btn--primary" id="btnResumePause">Resume</button>
    <button class="ol-btn"                 id="btnRestartPause">Restart</button>
    <button class="ol-btn"                 id="btnBackMenu">Main Menu</button>
  </div>
</div>

<div class="overlay hidden" id="gameOverOverlay">
  <div class="overlay-box">
    <button class="ol-close" id="btnCloseGameOver" aria-label="Close">✕</button>
    <div class="ol-baybayin">ᜆᜉᜓᜐ᜔</div>
    <h2 class="overlay-title">Game Over</h2>
    <div class="ol-divider"></div>
    <p class="ol-stat">Final Score &nbsp;<strong id="finalScore">0</strong></p>
    <p class="ol-stat">Words Spelled &nbsp;<strong id="finalWords">0</strong></p>
    <p class="ol-stat">Best Combo &nbsp;<strong id="finalCombo">x1</strong></p>
    <div class="ol-divider"></div>
    <button class="ol-btn ol-btn--primary" id="btnPlayAgain">Play Again</button>
    <button class="ol-btn"                 id="btnBackMenu2">Main Menu</button>
  </div>
</div>

<div class="overlay hidden" id="victoryOverlay">
  <div class="overlay-box overlay-box--victory">
    <button class="ol-close" id="btnCloseVictory" aria-label="Close">✕</button>
    <h2 class="overlay-title gold">Victory!</h2>
    <div class="ol-divider"></div>
    <p class="ol-stat">Score &nbsp;<strong id="victoryScore">0</strong></p>
    <div class="ol-divider"></div>
    <button class="ol-btn ol-btn--primary" id="btnNextChapter">Next Chapter</button>
    <button class="ol-btn"                 id="btnBackMenu3">Main Menu</button>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/HUD.js"></script>
<script src="js/TileGrid.js"></script>
<script src="js/WordBuilder.js"></script>
<script src="js/EnemyManager.js"></script>
<script src="js/GameEngine.js"></script>
<script src="js/main.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    var name = localStorage.getItem('playerName');
    var byId    = document.getElementById('playerName');
    var byClass = document.querySelector('.score-label');
    if (byId)    byId.textContent    = name ? name.toUpperCase() : 'PLAYER';
    if (byClass) byClass.textContent = name ? name.toUpperCase() : 'TALA';
  });
</script>
</body>
</html>
