<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baybayin Wizards</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

  <main class="screen" id="startScreen">

    <!-- Title -->
    <div class="title-panel">
      <div class="corner-tl"></div>
      <div class="corner-br"></div>

      <div class="title-en">Baybayin Wizards</div>
      <div class="subtitle">Start your Wizard adventure with Baybayin alphabets!</div>

      <div class="divider"></div>

      <nav class="btn-group" role="navigation" aria-label="Main menu">

        <button class="btn btn--start" id="btnStart" type="button" aria-label="Start a new game" onclick="window.location.href='/gameplay/index.html'">
          Start Game
        </button>

        <button class="btn btn--resume btn--disabled" id="btnResume" type="button" aria-label="Resume saved game" disabled>
          Resume
        </button>

        <button class="btn btn--settings" id="btnSettings" type="button" aria-label="Open settings">
          Settings
        </button>

      </nav>
    </div>
  </main>

  <!-- ── Settings Modal ──────────────────────────────────────── -->
  <div class="modal-overlay" id="settingsModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <button class="modal-close" id="modalClose" aria-label="Close settings">✕</button>
      <h2 class="modal-title" id="modalTitle">Settings</h2>

      <div class="setting-row">
        <span class="setting-label">Sound Effects</span>
        <label class="toggle" aria-label="Toggle sound effects">
          <input type="checkbox" id="toggleSfx" checked />
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>

      <div class="setting-row">
        <span class="setting-label">Music</span>
        <label class="toggle" aria-label="Toggle background music">
          <input type="checkbox" id="toggleMusic" checked />
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>

      <div class="setting-row">
        <span class="setting-label">Volume</span>
        <input type="range" class="volume-slider" id="volumeSlider"
               min="0" max="100" value="70" aria-label="Volume level" />
      </div>

      <div class="setting-row">
        <span class="setting-label">Show Romanization</span>
        <label class="toggle" aria-label="Toggle romanization hints">
          <input type="checkbox" id="toggleRoman" checked />
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>

      <div class="setting-row">
        <span class="setting-label">Fullscreen</span>
        <label class="toggle" aria-label="Toggle fullscreen">
          <input type="checkbox" id="toggleFullscreen" />
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
    </div>
  </div>

  <script src="../js/SettingsModal.js"></script>
  <script src="../js/ResumeButton.js"></script>
  <script src="../js/StartButton.js"></script>
  <script src="../js/main.js"></script>

</body>
</html>
