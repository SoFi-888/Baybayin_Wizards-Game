<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baybayin Wizards</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <div class="bg-layer" aria-hidden="true"></div>

  <main class="screen" id="startScreen">

    <div class="mascot-wrap">
      <svg class="mascot" viewBox="0 0 130 120" xmlns="http://www.w3.org/2000/svg">
        <!-- Body segments -->
        <ellipse cx="65" cy="95" rx="22" ry="16" fill="#4a8c3f"/>
        <ellipse cx="65" cy="80" rx="20" ry="15" fill="#5aa84e"/>
        <ellipse cx="65" cy="66" rx="19" ry="14" fill="#4a8c3f"/>
        <ellipse cx="65" cy="52" rx="20" ry="15" fill="#5aa84e"/>
        <!-- Segment lines -->
        <line x1="44" y1="87" x2="86" y2="87" stroke="#3d7635" stroke-width="1.2" stroke-dasharray="2,2"/>
        <line x1="46" y1="73" x2="84" y2="73" stroke="#3d7635" stroke-width="1.2" stroke-dasharray="2,2"/>
        <line x1="46" y1="59" x2="84" y2="59" stroke="#3d7635" stroke-width="1.2" stroke-dasharray="2,2"/>
        <!-- Head -->
        <ellipse cx="65" cy="38" rx="22" ry="20" fill="#6dc05f"/>
        <ellipse cx="65" cy="34" rx="19" ry="16" fill="#7dd470"/>
        <!-- Eyes -->
        <circle cx="57" cy="31" r="5.5" fill="white"/>
        <circle cx="73" cy="31" r="5.5" fill="white"/>
        <circle cx="58" cy="32" r="3"   fill="#1e0f02"/>
        <circle cx="74" cy="32" r="3"   fill="#1e0f02"/>
        <!-- Eye shine -->
        <circle cx="59.5" cy="30.5" r="1" fill="white"/>
        <circle cx="75.5" cy="30.5" r="1" fill="white"/>
        <!-- Smile -->
        <path d="M 57 42 Q 65 49 73 42" stroke="#3d7635" stroke-width="1.8" fill="none" stroke-linecap="round"/>
        <!-- Mini book -->
        <rect x="78" y="50" width="22" height="28" rx="2" fill="#d4a017"/>
        <rect x="80" y="52" width="18" height="24" rx="1" fill="#f5e6c8"/>
        <line x1="89" y1="52" x2="89" y2="76" stroke="#c49010" stroke-width="1.5"/>
        <text x="83" y="67" font-size="9" fill="#1e0f02" font-family="serif">ᜊ</text>
        <!-- Antennae -->
        <line x1="57" y1="19" x2="50" y2="7" stroke="#5aa84e" stroke-width="2" stroke-linecap="round"/>
        <circle cx="50" cy="6" r="3" fill="#d4a017"/>
        <line x1="73" y1="19" x2="80" y2="7" stroke="#5aa84e" stroke-width="2" stroke-linecap="round"/>
        <circle cx="80" cy="6" r="3" fill="#d4a017"/>
      </svg>
    </div>

    <!-- Title Card -->
    <div class="title-panel">
      <div class="corner-tl"></div>
      <div class="corner-br"></div>

      <div class="baybayin-title">ᜊᜌᜊᜌᜒᜈ᜔</div>
      <div class="title-en">Baybayin Wizards</div>
      <div class="subtitle">An Ancient Script Adventure</div>

      <div class="divider"></div>

      <nav class="btn-group" role="navigation" aria-label="Main menu">

        <button class="btn btn--start" id="btnStart" type="button" aria-label="Start a new game">
          <span class="btn-icon">ᜊ</span>
          Start Game
        </button>

        <button class="btn btn--resume btn--disabled" id="btnResume" type="button" aria-label="Resume saved game" disabled>
          <span class="btn-icon">ᜃ</span>
          Resume
        </button>

        <button class="btn btn--settings" id="btnSettings" type="button" aria-label="Open settings">
          <span class="btn-icon">⚙</span>
          Settings
        </button>

      </nav>
    </div>

    <p class="screen-footer">v0.1 · Preludyo · ᜊᜊ</p>
  </main>

  <!-- ── Settings Modal ──────────────────────────────────────── -->
  <div class="modal-overlay" id="settingsModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <button class="modal-close" id="modalClose" aria-label="Close settings">✕</button>
      <h2 class="modal-title" id="modalTitle">⚙ Settings</h2>

      <div class="setting-row">
        <span class="setting-label">Sound Effects</span>
        <label class="toggle" aria-label="Toggle sound effects">
          <input type="checkbox" id="toggleSfx" checked />
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>

      <div class="setting-row">
        <span class="setting-label">Music</span>
        <label class="toggle" aria-label="Toggle background music">
          <input type="checkbox" id="toggleMusic" checked />
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>

      <div class="setting-row">
        <span class="setting-label">Volume</span>
        <input type="range" class="volume-slider" id="volumeSlider"
               min="0" max="100" value="70" aria-label="Volume level" />
      </div>

      <div class="setting-row">
        <span class="setting-label">Show Romanization</span>
        <label class="toggle" aria-label="Toggle romanization hints">
          <input type="checkbox" id="toggleRoman" checked />
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>

      <div class="setting-row">
        <span class="setting-label">Fullscreen</span>
        <label class="toggle" aria-label="Toggle fullscreen">
          <input type="checkbox" id="toggleFullscreen" />
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
    </div>
  </div>

  <script src="js/SettingsModal.js"></script>
  <script src="js/ResumeButton.js"></script>
  <script src="js/StartButton.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
